<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .tag-container {
            width: 85mm; /* လိုအပ်သလို အနည်းငယ် ထပ်ညှိနိုင်သည် */
            border: 1px solid #ccc;
            padding: 12px;
            margin: 10px;
            display: inline-block;
            background: white;
            position: relative;
        }
        .item-name {
            font-size: 1rem;
            font-weight: bold;
            height: 2.2em;
            overflow: hidden;
            line-height: 1.1;
        }
        .barcode-section {
            text-align: center;
            width: 55%;
        }
        .price-section {
            width: 45%;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .price-box {
            background-color: #ffeb3b; /* Yellow background */
            padding: 5px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
        }
        .currency {
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 8px;
        }
        .price-text {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .date-text {
            font-size: 0.75rem;
            margin-bottom: 4px;
            font-weight: bold;
        }
        @media print {
            .no-print { display: none !important; }
            .tag-container { margin: 0; border: 0.1px solid #ddd; }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center no-print mb-4">
            <h2>Shelf Tag Generator</h2>
            <button onclick="window.print()" class="btn btn-primary">Print Tags</button>
        </div>
        
        <div id="loading" class="text-center no-print">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading data...</p>
        </div>

        <div id="labels-output"></div>
    </div>

    <script>
        const WEB_APP_URL = 'သင့်ရဲ့_URL_ကိုဒီမှာပြန်ထည့်ပါ';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
                const data = await response.json();
                document.getElementById('loading').classList.add('d-none');
                renderTags(data);
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p class="text-danger">Error: ' + error.message + '</p>';
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = '';

            data.forEach((item, index) => {
                const tagHtml = `
                    <div class="tag-container">
                        <div class="text-center text-danger fw-bold mb-1" style="font-size: 1.2rem;">Star Mart</div>
                        <div class="item-name mb-1">${item['Item Name']}</div>
                        <div class="small fw-bold mb-2">${item['Code']}</div>
                        
                        <div class="d-flex justify-content-between align-items-end">
                            <div class="barcode-section text-center">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            
                            <div class="price-section">
                                <div class="date-text">${item['Date']}</div>
                                <div class="d-flex align-items-center">
                                    <span class="currency">Ks.</span>
                                    <div class="price-box">
                                        <span class="price-text">${Number(item['Price']).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                setTimeout(() => {
                    JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                        format: "CODE128",
                        width: 1.4,
                        height: 45,
                        displayValue: true, // Barcode number ကို အောက်မှာ ပြပေးမှာပါ
                        fontSize: 14,
                        fontOptions: "bold",
                        margin: 0
                    });
                }, 0);
            });
        }

        fetchData();
    </script>
</body>
</html>
