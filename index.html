<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    
    <script src="https://unpkg.com/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        
        .no-print-bar {
            background-color: #fff;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .btn-print {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Screen View Layout */
        .print-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 75mm);
            gap: 5mm;
            padding: 10mm;
            justify-content: center;
        }

        /* 7.5cm x 3.5cm Dimensions */
        .tag-container {
            width: 75mm !important; 
            height: 35mm !important;
            min-width: 75mm !important;
            min-height: 35mm !important;
            border: 1px solid #000;
            padding: 2mm 3mm;
            background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .tag-header {
            text-align: center;
            color: #dc3545;
            font-weight: bold;
            font-size: 12pt;
            line-height: 1;
        }

        .item-name {
            font-size: 10pt;
            font-weight: bold;
            line-height: 1.2;
            height: 2.4em;
            overflow: hidden;
            color: #000;
        }

        .item-code { 
            font-weight: bold; 
            font-size: 8pt; 
            color: #333;
            line-height: 1;
        }
        
        .footer-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 12mm;
        }

        .barcode-area { 
            width: 45%; 
            text-align: left;
        }

        .barcode-area svg {
            width: 100% !important;
            height: 12mm !important;
            display: block;
        }

        .price-area {
            width: 53%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .date-text { 
            font-size: 7.5pt; 
            font-weight: bold; 
            margin-bottom: 1px;
            color: #000;
        }
        
        .price-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: flex-end;
        }

        .currency {
            font-size: 11pt;
            font-weight: bold;
            margin-right: 3px;
            color: #000;
        }

        .price-box {
            background-color: #ffee00 !important;
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact;
            padding: 2px 4px;
            flex-grow: 1;
            text-align: center;
        }

        .price-amount { 
            font-size: 15pt; 
            font-weight: 900; 
            line-height: 1;
            color: #000;
        }

        /* Print Settings */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm; 
            }
            .no-print { display: none !important; }
            body { background: white; padding: 10mm 5mm; }
            
            .print-grid {
                padding: 0;
                margin: 0;
                gap: 1mm;
                grid-template-columns: repeat(2, 75mm);
                justify-content: center;
            }
            .tag-container { 
                page-break-inside: avoid;
                border: 0.5px solid #222;
            }
        }
    </style>
</head>
<body>

    <div class="no-print no-print-bar">
        <h4 style="margin:0;">Shelf Tag Generator (7.5cm x 3.5cm)</h4>
        <button onclick="window.print()" class="btn-print">Print Tags</button>
    </div>

    <div id="labels-output" class="print-grid"></div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwiHSWgZlUNar8oI0LsRg72kwklJ9LSpgoqCIQYWIxZNlHCmYMR1z5KeQ2wWq4aBHgR/exec';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
                const data = await response.json();
                renderTags(data);
            } catch (error) {
                console.error(error);
                alert('Data ဆွဲယူရတာ အဆင်မပြေပါသဖြင့် ကွန်ရက်ပြန်စစ်ပေးပါ။');
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = '';

            data.forEach((item, index) => {
                let rawDate = String(item['Date'] || '');
                let cleanDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate;

                // tag-header ထဲတွင် Star Mart အစား St.Lotus သို့ ပြောင်းလဲထားပါသည်
                const tagHtml = `
                    <div class="tag-container">
                        <div class="tag-header">St.Lotus</div>
                        <div class="item-name">${item['Item Name']}</div>
                        <div class="item-code">${item['Code']}</div>
                        
                        <div class="footer-row">
                            <div class="barcode-area">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            <div class="price-area">
                                <div class="date-text">${cleanDate}</div>
                                <div class="price-wrapper">
                                    <span class="currency">Ks.</span>
                                    <div class="price-box">
                                        <span class="price-amount">${Number(item['Price']).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                setTimeout(() => {
                    if (typeof JsBarcode !== 'undefined') {
                        JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                            format: "CODE128",
                            width: 1.3,          
                            height: 35,          
                            displayValue: true,
                            fontSize: 11,
                            fontOptions: "bold",
                            textMargin: 2,
                            margin: 0
                        });
                    }
                }, 50);
            });
        }
        fetchData();
    </script>
</body>
</html>
