<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        
        /* Screen View Layout */
        .print-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 75mm);
            gap: 4mm;
            padding: 10mm;
            justify-content: center;
        }

        /* 7.5cm x 3.5cm အတိအကျ သတ်မှတ်ချက် */
        .tag-container {
            width: 75mm; 
            height: 35mm;
            border: 1px solid #111;
            padding: 2mm 3mm;
            background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .tag-header {
            text-align: center;
            color: #dc3545;
            font-weight: bold;
            font-size: 12pt;
            line-height: 1;
            margin-bottom: 1mm;
        }

        .item-name {
            font-size: 10pt;
            font-weight: bold;
            line-height: 1.1;
            height: 2.2em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #000;
        }

        .item-code { 
            font-weight: bold; 
            font-size: 8pt; 
            color: #333;
            line-height: 1;
        }
        
        .footer-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 14mm;
        }

        .barcode-area { 
            width: 48%; 
            text-align: left;
        }

        /* Barcode ပုံရိပ်ကို အမဲတန်းထင်ထင်ရှားရှား ထွက်စေရန် */
        .barcode-area svg {
            width: 100%;
            height: 14mm !important; /* အမြင့်ကို အတင်းသတ်မှတ်ပေးခြင်း */
            display: block;
        }

        .price-area {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .date-text { 
            font-size: 7.5pt; 
            font-weight: bold; 
            margin-bottom: 1px;
            color: #000;
        }
        
        .price-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: flex-end;
        }

        .currency {
            font-size: 11pt;
            font-weight: bold;
            margin-right: 3px;
            color: #000;
        }

        .price-box {
            background-color: #ffee00 !important;
            -webkit-print-color-adjust: exact; /* Print မှာ အဝါရောင် ကွက်တိပါအောင် အတင်းခိုင်းခြင်း */
            print-color-adjust: exact;
            padding: 2px 4px;
            flex-grow: 1;
            max-width: 28mm;
            text-align: center;
        }

        .price-amount { 
            font-size: 15pt; 
            font-weight: 900; 
            line-height: 1;
            color: #000;
        }

        /* --- Print လုပ်ဆောင်ချက်ကို အပြည့်အဝ ထိန်းချုပ်ခြင်း --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm; /* Browser ရဲ့ ဘေးဘောင်အပိုတွေကို သုညလုပ်ခြင်း */
            }
            .no-print { display: none !important; }
            body { background: white; padding: 10mm 5mm; }
            
            .print-grid {
                padding: 0;
                margin: 0;
                gap: 1mm;
                grid-template-columns: repeat(2, 75mm); /* စာရွက်အကျယ်ထဲ ၂ ခုစီ ကွက်တိ တန်းစီမယ် */
                justify-content: center;
            }
            .tag-container { 
                page-break-inside: avoid;
                border: 0.5px solid #222;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-3 no-print">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Shelf Tag Generator (7.5cm x 3.5cm)</h4>
            <button onclick="window.print()" class="btn btn-primary px-4">Print Tags</button>
        </div>
        <div id="loading" class="text-center alert alert-info">Loading data...</div>
    </div>

    <div id="labels-output" class="print-grid"></div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzvwOo7NhTNipukzgJodvytZ95SJphex3fjabrfgCe7dpcGlg9TB6B9WSKaXIrY7Pnw/exec';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
                const data = await response.json();
                if(document.getElementById('loading')) document.getElementById('loading').className = 'd-none';
                renderTags(data);
            } catch (error) {
                if(document.getElementById('loading')) document.getElementById('loading').innerHTML = 'Error: ' + error.message;
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = '';

            data.forEach((item, index) => {
                let rawDate = String(item['Date'] || '');
                let cleanDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate;

                const tagHtml = `
                    <div class="tag-container">
                        <div class="tag-header">Star Mart</div>
                        <div class="item-name">${item['Item Name']}</div>
                        <div class="item-code">${item['Code']}</div>
                        
                        <div class="footer-row">
                            <div class="barcode-area">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            <div class="price-area">
                                <div class="date-text">${cleanDate}</div>
                                <div class="price-wrapper">
                                    <span class="currency">Ks.</span>
                                    <div class="price-box">
                                        <span class="price-amount">${Number(item['Price']).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                setTimeout(() => {
                    JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                        format: "CODE128",
                        width: 1.5,          // လိုင်းတွေကို မထူမပါး ပြန်ညှိထားပါတယ်
                        height: 35,          // ဆံ့အောင် အမြင့်လျော့ထားပါတယ်
                        displayValue: true,
                        fontSize: 12,
                        fontOptions: "bold",
                        textMargin: 2,
                        margin: 0
                    });
                }, 0);
            });
        }
        fetchData();
    </script>
</body>
</html>
