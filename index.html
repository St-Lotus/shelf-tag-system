<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .tag-container {
            width: 80mm; /* Sticker အရွယ်အစားအလိုက် ပြင်နိုင်သည် */
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            background: white;
            vertical-align: top;
        }
        #barcode { width: 100%; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .tag-container { margin: 0; border: 0.1px solid #eee; page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center no-print mb-4">
            <h2>Shelf Tag Generator</h2>
            <button onclick="window.print()" class="btn btn-primary">Print Tags</button>
        </div>
        
        <div id="loading" class="text-center no-print">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading data from Google Sheets...</p>
        </div>

        <div id="labels-output">
            </div>
    </div>

    <script>
        // သင့်ရဲ့ Web App URL ကို အောက်ကနေရာမှာ အစားထိုးထည့်ပါ
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzsK9sCypwM1gakkR99msnrPMe5eIBb4Vn7eORHzHcrne72jCF02DWf2W1OXBfyZY6N/exec';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                document.getElementById('loading').classList.add('d-none');
                renderTags(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loading').innerHTML = '<p class="text-danger">Error loading data. Please check your URL.</p>';
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = ''; // Clear old data

            data.forEach((item, index) => {
                const tagHtml = `
                    <div class="tag-container">
                        <div class="text-center text-danger fw-bold h5 mb-1">Star Mart</div>
                        <div class="fw-bold text-dark" style="font-size: 0.9rem; height: 2.4em; overflow: hidden;">${item['Item Name']}</div>
                        <div class="fw-bold small text-secondary">${item['Code']}</div>
                        
                        <div class="d-flex justify-content-between align-items-end mt-2">
                            <div style="width: 60%;">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            <div class="bg-warning p-2 text-center" style="min-width: 90px; border-radius: 4px;">
                                <span class="h4 fw-bold mb-0">${Number(item['Price']).toLocaleString()}</span>
                                <div style="font-size: 0.7rem; font-weight: bold;">Ks.</div>
                            </div>
                        </div>
                        <div class="text-end text-muted mt-1" style="font-size: 0.6rem;">${item['Date']}</div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                // Barcode render (Data ဆွဲပြီးမှ ခေါ်ရန်)
                setTimeout(() => {
                    JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                        format: "CODE128",
                        width: 1.2,
                        height: 35,
                        displayValue: false,
                        margin: 0
                    });
                }, 0);
            });
        }

        // စတင်ချိန်တွင် Data ဆွဲရန်
        fetchData();
    </script>
</body>
</html>
