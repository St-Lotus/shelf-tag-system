<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Arial', sans-serif; }
        .tag-container {
            width: 85mm; 
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            background: white;
        }
        .item-name {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.2;
            height: 2.4em;
            overflow: hidden;
            margin-bottom: 2px;
        }
        .item-code { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        
        .footer-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .barcode-area { width: 50%; text-align: left; }
        .price-area {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .date-text { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; }
        
        .price-wrapper {
            display: flex;
            align-items: center;
            white-space: nowrap; /* Ks နဲ့ စျေးနှုန်း တစ်တန်းတည်းဖြစ်စေရန် */
        }
        .currency {
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 5px;
        }
        .price-box {
            background-color: #ffee00;
            padding: 2px 8px;
            min-width: 100px;
            text-align: center;
        }
        .price-amount { font-size: 1.8rem; font-weight: 800; }

        @media print {
            .no-print { display: none !important; }
            .tag-container { margin: 0; border: 0.1px solid #ccc; page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center no-print mb-4">
            <h4>Shelf Tag Generator</h4>
            <button onclick="window.print()" class="btn btn-primary">Print Now</button>
        </div>
        <div id="loading" class="text-center no-print">Loading data...</div>
        <div id="labels-output"></div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzvwOo7NhTNipukzgJodvytZ95SJphex3fjabrfgCe7dpcGlg9TB6B9WSKaXIrY7Pnw/exec';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
                const data = await response.json();
                document.getElementById('loading').className = 'd-none';
                renderTags(data);
            } catch (error) {
                document.getElementById('loading').innerHTML = 'Error: ' + error.message;
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = '';

            data.forEach((item, index) => {
                // ရက်စွဲမှ စာသားအပိုများကို ဖြတ်ထုတ်ခြင်း (e.g., 2026-04-04T17:30... -> 2026-04-04)
                let rawDate = String(item['Date'] || '');
                let cleanDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate;

                const tagHtml = `
                    <div class="tag-container">
                        <div class="text-center text-danger fw-bold h5 mb-1">Star Mart</div>
                        <div class="item-name">${item['Item Name']}</div>
                        <div class="item-code">${item['Code']}</div>
                        
                        <div class="footer-row">
                            <div class="barcode-area">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            <div class="price-area">
                                <div class="date-text">${cleanDate}</div>
                                <div class="price-wrapper">
                                    <span class="currency">Ks.</span>
                                    <div class="price-box">
                                        <span class="price-amount">${Number(item['Price']).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                setTimeout(() => {
                    JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                        format: "CODE128",
                        width: 1.3,
                        height: 40,
                        displayValue: true,
                        fontSize: 14,
                        fontOptions: "bold",
                        margin: 0
                    });
                }, 0);
            });
        }
        fetchData();
    </script>
</body>
</html>
