<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Shelf Tag System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Web Page View Setting */
        body { background-color: #f8f9fa; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        
        /* Grid Layout: A4 ပေါ်မှာ တန်းစီဖို့ ပတ်ပတ်လည် Margin ချန်ပြီး Grid သုံးထားပါတယ် */
        .print-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 75mm);
            gap: 2mm; /* Tag တစ်ခုနဲ့တစ်ခုကြား အကွာအဝေး */
            justify-content: center;
            padding: 10mm;
        }

        /* 7.5cm x 3.5cm အတိအကျ သတ်မှတ်ခြင်း */
        .tag-container {
            width: 75mm; 
            height: 35mm;
            border: 1px solid #aaa;
            padding: 2mm;
            background: white;
            box-sizing: border-box; /* Padding ကြောင့် ဆိုဒ်မပွစေရန် */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .tag-header {
            text-center: center;
            color: #dc3545;
            font-weight: bold;
            font-size: 11pt;
            line-height: 1;
        }

        .item-name {
            font-size: 9pt;
            font-weight: bold;
            line-height: 1.1;
            height: 2.2em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .item-code { 
            font-weight: bold; 
            font-size: 8pt; 
            color: #444;
            line-height: 1;
        }
        
        .footer-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 14mm; /* အောက်ခြေအပိုင်း အရွယ်အစား ပုံသေထားခြင်း */
        }

        .barcode-area { 
            width: 50%; 
            text-align: left;
        }

        /* Barcode SVG ကို Container ထဲ ကွက်တိဝင်အောင် ညှိခြင်း */
        .barcode-area svg {
            width: 100%;
            height: auto;
            max-height: 13mm;
        }

        .price-area {
            width: 48%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .date-text { 
            font-size: 7pt; 
            font-weight: bold; 
            margin-bottom: 1px;
            color: #333;
        }
        
        .price-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: flex-end;
        }

        .currency {
            font-size: 10pt;
            font-weight: bold;
            margin-right: 2px;
        }

        .price-box {
            background-color: #ffee00;
            padding: 1px 4px;
            flex-grow: 1;
            max-width: 26mm;
            text-align: center;
            border-radius: 2px;
        }

        .price-amount { 
            font-size: 14pt; 
            font-weight: 800; 
            line-height: 1.1;
            display: block;
        }

        /* --- Print ဆွဲတဲ့အခါ အလုပ်လုပ်မယ့် CSS Settings --- */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-grid {
                padding: 0;
                margin: 0;
                gap: 1mm; /* Print ထုတ်ရင် နေရာချွေတာဖို့ ကပ်လိုက်ပါမယ် */
                grid-template-columns: repeat(2, 75mm); /* A4 အကျယ်ထဲမှာ ၂ ခုစီ အပြိုင်စီရန် */
            }
            .tag-container { 
                border: 0.5px solid #ccc; /* ဖြတ်ရလွယ်အောင် ဘောင်လိုင်းပါးပါးလေးပဲ ထားပါမယ် */
            }
        }
    </style>
</head>
<body>
    <div class="container mt-3 no-print">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Shelf Tag Generator (7.5cm x 3.5cm)</h4>
            <button onclick="window.print()" class="btn btn-primary px-4">Print Tags</button>
        </div>
        <div id="loading" class="text-center alert alert-info">Loading data...</div>
    </div>

    <div id="labels-output" class="print-grid"></div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzvwOo7NhTNipukzgJodvytZ95SJphex3fjabrfgCe7dpcGlg9TB6B9WSKaXIrY7Pnw/exec';

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL, { redirect: 'follow' });
                const data = await response.json();
                if(document.getElementById('loading')) document.getElementById('loading').className = 'd-none';
                renderTags(data);
            } catch (error) {
                if(document.getElementById('loading')) document.getElementById('loading').innerHTML = 'Error: ' + error.message;
            }
        }

        function renderTags(data) {
            const container = document.getElementById('labels-output');
            container.innerHTML = '';

            data.forEach((item, index) => {
                let rawDate = String(item['Date'] || '');
                let cleanDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate;

                const tagHtml = `
                    <div class="tag-container">
                        <div class="tag-header">Star Mart</div>
                        <div class="item-name">${item['Item Name']}</div>
                        <div class="item-code">${item['Code']}</div>
                        
                        <div class="footer-row">
                            <div class="barcode-area">
                                <svg id="barcode-${index}"></svg>
                            </div>
                            <div class="price-area">
                                <div class="date-text">${cleanDate}</div>
                                <div class="price-wrapper">
                                    <span class="currency">Ks.</span>
                                    <div class="price-box">
                                        <span class="price-amount">${Number(item['Price']).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += tagHtml;
                
                setTimeout(() => {
                    JsBarcode(`#barcode-${index}`, String(item['Barcode Number']), {
                        format: "CODE128",
                        width: 2,           // Barcode အမဲတန်း စိပ်/ကျဲ အချိုး
                        height: 30,          // Barcode အမြင့်
                        displayValue: true,  // နံပါတ်ကို အောက်မှာပြမည်
                        fontSize: 11,
                        fontOptions: "bold",
                        margin: 0
                    });
                }, 0);
            });
        }
        fetchData();
    </script>
</body>
</html>
